name: Build, Test & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Run Tests
        run: ./gradlew test

      - name: Build CLI JAR
        run: ./gradlew cliJar

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codevigil-plugin
          path: build/distributions/*.zip

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codevigil-cli
          path: build/libs/*-cli.jar

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Auto Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Build CLI JAR
        run: ./gradlew cliJar

      - name: Get version
        id: version
        run: |
          BASE_VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TAG="v${BASE_VERSION}-build.${GITHUB_RUN_NUMBER}"
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CodeVigil ${{ steps.version.outputs.tag }}"
          body: |
            Automated release from commit ${{ steps.version.outputs.sha }}

            **Changes:** ${{ github.event.head_commit.message }}

            ## Downloads
            - **JetBrains Plugin**: `codevigil-${{ steps.version.outputs.base }}.zip`
            - **CLI JAR**: `codevigil-${{ steps.version.outputs.base }}-cli.jar` — run with `java -jar codevigil-cli.jar --help`
          files: |
            build/distributions/*.zip
            build/libs/*-cli.jar
          generate_release_notes: true

      - name: Publish to JetBrains Marketplace
        if: ${{ vars.PUBLISH_TOKEN != '' || secrets.PUBLISH_TOKEN != '' }}
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin
