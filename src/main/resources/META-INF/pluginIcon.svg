<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#0984E3"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>
  <!-- Eye shape (vigil = watching) -->
  <ellipse cx="20" cy="20" rx="13" ry="8" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Iris -->
  <circle cx="20" cy="20" r="5.5" fill="white" opacity="0.9"/>
  <!-- Pupil with code bracket -->
  <circle cx="20" cy="20" r="3" fill="#2D3436"/>
  <!-- Code brackets inside pupil -->
  <text x="20" y="22" font-family="monospace" font-size="5" fill="#6C5CE7" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>
  <!-- Scan lines (vigilance) -->
  <line x1="7" y1="12" x2="10" y2="14" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="33" y1="12" x2="30" y2="14" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="7" y1="28" x2="10" y2="26" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="33" y1="28" x2="30" y2="26" stroke="white" stroke-width="1" opacity="0.6"/>
</svg>
